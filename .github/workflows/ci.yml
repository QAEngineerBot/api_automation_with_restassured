
name: API Automation Framework

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule: #set the cron for midnight IST
    - cron: "30 18 * * *"  
  workflow_dispatch:
    inputs:
      env :
        description: "Environment"
        type: choice
        options:
          - qa
          - dev
          - uat
        default: qa
        required: true

      suiteXmlFile :
        description: "TestNG XML file"
        type: choice
        options:
          - testng.xml
          - smoke.xml
          - regression.xml
        default: testng.xml
        required: true       

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Execute test automation framework
      run: mvn clean test -DsuiteXmlFile="${{ github.event.inputs.suiteXmlFile }}" -Denv="${{ github.event.inputs.env }}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Surefire Reports
        path: target/surefire-reports/
        retention-days: 10
